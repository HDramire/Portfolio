<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data:; font-src https://fonts.gstatic.com; object-src 'none'; base-uri 'self'; form-action 'self' mailto:; upgrade-insecure-requests">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>Henry Ramirez Jr. | Choose a Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="page active" id="profile-selection-page">
        <section class="profile-selection">
            <div class="container">
                <h2>Who's Watching?</h2>
                <div class="profiles">
                    <a class="profile" data-profile="recruiter" data-href="profiles/recruiter.html" href="profiles/recruiter.html">
                        <img src="fotos/person1.png" alt="Recruiter profile" class="person">
                        <div class="profile-name">Recruiter</div>
                    </a>
                    <a class="profile" data-profile="developer" data-href="profiles/developer.html" href="profiles/developer.html">
                        <img src="fotos/person2.png" alt="Developer profile" class="person">
                        <div class="profile-name">Developer</div>
                    </a>
                    <a class="profile" data-profile="client" data-href="profiles/client.html" href="profiles/client.html">
                        <img src="fotos/person6.png" alt="Client profile" class="person">
                        <div class="profile-name">Client</div>
                    </a>
                    <a class="profile" data-profile="adventurer" data-href="profiles/adventurer.html" href="profiles/adventurer.html">
                        <img src="fotos/person4.png" alt="Adventurer profile" class="person">
                        <div class="profile-name">Adventurer</div>
                    </a>
                </div>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
